services:
  multiwebllm-app:
    container_name: multiwebllm-app
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    environment:
      - REDIS_URL=${REDIS_URL:-redis://multiwebllm-redis:6379}
    depends_on:
      multiwebllm-db:
        condition: service_healthy
      multiwebllm-redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - multiwebllm-net

  multiwebllm-db:
    container_name: multiwebllm-db
    image: postgres:16-alpine
    volumes:
      - multiwebllm-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: multiwebllm
      POSTGRES_USER: multiwebllm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-multiwebllm_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U multiwebllm"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - multiwebllm-net

  multiwebllm-redis:
    container_name: multiwebllm-redis
    image: redis:8-alpine
    volumes:
      - multiwebllm-redisdata:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - multiwebllm-net

networks:
  multiwebllm-net:
    driver: bridge

volumes:
  multiwebllm-pgdata:
  multiwebllm-redisdata:
