services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - aiproxy-net

  postgres:
    image: postgres:16-alpine
    # No host port - only accessible within Docker network
    volumes:
      - aiproxy-pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: aiproxy
      POSTGRES_USER: aiproxy
      POSTGRES_PASSWORD: ${DB_PASSWORD:-aiproxy_secret}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiproxy"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - aiproxy-net

networks:
  aiproxy-net:
    driver: bridge

volumes:
  aiproxy-pgdata:
